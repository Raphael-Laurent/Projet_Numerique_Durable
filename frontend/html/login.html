<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page de connexion à la plateforme. Entrez votre identifiant et mot de passe pour accéder à votre compte. Cliquez sur 'Créer un compte' pour vous inscrire.">
    <title>Connexion</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/login.js" defer></script>
</head>
<body>

    <main>
        <section id="login-section">

            <h1>Connexion</h1>
            
            <p id="errorMessage"></p>

            <form id="loginForm">
                <label for="identifiant">Identifiant</label>
                <input type="text" id="identifiant" name="identifiant" required>

                <label for="mdp">Mot de passe</label>
                <input type="password" id="mdp" name="mdp" required>

                <button type="submit">Se connecter</button>
            </form>

            <p>
                Pas encore de compte ?
                <a href="/signup.html">Créer un compte</a>
            </p>
        </section>
    </main>

    <footer>
            <p>FicheStudy — Plateforme de révision</p>
    </footer>
</body>
</html>
