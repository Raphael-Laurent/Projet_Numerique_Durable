<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Create Fiches</title>
</head>
<body>

    <header>
        <nav>
            <a href="accueil.html">Accueil</a>
            <a href="fiches.html">Mes Fiches</a>
            <a id="link_account" href="account.html">Compte</a>
        </nav>
    </header>

    <main>

        <section id="creation_fiche">

        <h1>Créer une fiche</h1>

        <form id="form_fiche">

            <label for="titre">Titre</label><br>
            <input type="text" id="titre" name="titre" required><br><br>

            <label for="contenu">Contenu</label><br>
            <textarea id="contenu" name="contenu" rows="10" cols="50" required></textarea><br><br>
            
            <label for="categorie">Catégorie</label><br>
            <input type="text" id="categorie" name="categorie"><br><br>

            <button type="submit">Enregistrer</button>

        </form>

    </section>

    </main>

</body>
