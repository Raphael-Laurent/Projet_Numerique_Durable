<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fiches</title>
</head>
<body>

    <header>
        <nav>
            <a href="accueil.html">Accueil</a>
            <a href="fiches.html">Mes Fiches</a>
            <a id="link_account" href="account.html">Compte</a>
        </nav>
    </header>

    <main>

        <section id="create_fiche">
            <form action="fiches/create" method="post">
                <label for="title">Titre de la fiche :</label>
                <input type="text" id="title" name="title" required>

                <label for="category">Catégorie :</label>
                <input type="text" id="category" name="categorie" required>

                <label for="content">Contenu de la fiche :</label>
                <textarea id="content" name="content" required></textarea>

                <button type="submit">Créer la fiche</button>
            </form>
        </section>

    </main>

</body>
