<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes fiches</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/javascript/authGuard.js" defer></script>
</head>
<body>

    <header>
        <nav>
            <a href="/html/accueil.html">Accueil</a>
            <a href="/html/fiches.html">Mes fiches</a>
            <a href="/html/account.html">Compte</a>
            <button id="logoutBtn">Se déconnecter</button>
        </nav>
    </header>

    <main>
        <h1>Mes fiches</h1>

        <section>
            <h2>Créer une fiche</h2>

            <form id="create_fiche" action="/fiches/create" method="post">
                <label for="titre">Titre de la fiche :</label>
                <input type="text" id="titre" name="titre" required>

                <label for="categorie">Catégorie :</label>
                <input type="text" id="categorie" name="categorie" required>

                <label for="contenu">Contenu de la fiche :</label>
                <textarea id="contenu" name="contenu" required></textarea>

                <button type="submit">Créer la fiche</button>
            </form>
        </section>

        <section>
            <h2>Liste des fiches</h2>
            <div id="fiches_container"></div>
        </section>
    </main>

    <script src="/javascript/fiches.js" defer></script>
    <script src="/javascript/logout.js" defer></script>

</body>
</html>
