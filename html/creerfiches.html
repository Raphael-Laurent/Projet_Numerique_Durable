<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page pour créer une nouvelle fiche de révision. Remplissez le formulaire avec le titre, la catégorie et le contenu de votre fiche, puis appuyez sur le bouton 'Créer la fiche'.">
    <title>Créer une fiche</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/authGuard.js" defer></script>
</head>
<body>

    <header>
        <nav>
            <a href="/accueil.html">Accueil</a>
            <a href="/fiches.html">Mes fiches</a>
            <a href="/account.html">Compte</a>
            <a href="/admin.html" id="adminLink" style="display:none">Administration</a>
            <button id="logoutBtn">Se déconnecter</button>
        </nav>
    </header>

    <main>
        <h1>Mes fiches</h1>

        <section>
            <h2>Créer une fiche</h2>

            <form id="create_fiche" action="/fiches/create" method="post">
                <label for="titre">Titre de la fiche :</label>
                <input type="text" id="titre" name="titre" required>

                <label for="categorie">Catégorie :</label>
                <input type="text" id="categorie" name="categorie" required>

                <label for="contenu">Contenu de la fiche :</label>
                <textarea id="contenu" name="contenu" required></textarea>

                <button type="submit">Créer la fiche</button>
            </form>
        </section>

    </main>

    <script src="/fiches.js" defer></script>
    <script src="/logout.js" defer></script>

    <footer>
            <p>FicheStudy — Plateforme de révision</p>
    </footer>
</body>
</html>
