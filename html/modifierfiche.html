<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page pour modifier une fiche. Modifiez le titre, la catégorie ou le contenu de votre fiche, puis appuyez sur 'Enregistrer' pour sauvegarder les modifications.">
    <title>Modification de fiche</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/authGuard.js" defer></script>
    <script src="/modifierfiche.js" defer></script>
</head>
<body>

    <header>
        <nav>
            <a href="/accueil.html">Accueil</a>
            <a href="/fiches.html">Mes fiches</a>
            <a href="/account.html">Profil</a>
            <a href="/admin.html" id="adminLink" style="display:none">Administration</a>
            <button id="logoutBtn">Se déconnecter</button>
        </nav>
    </header>

    <main>
        <h1>Modifier la fiche</h1>

        <section>
            <form id="modifier_fiche">
                <label for="titre">Titre :</label>
                <input type="text" id="titre" name="titre" required>

                <label for="categorie">Catégorie :</label>
                <input type="text" id="categorie" name="categorie">

                <label for="contenu">Contenu :</label>
                <textarea id="contenu" name="contenu" required></textarea>

                <button type="submit">Enregistrer</button>
            </form>
        </section>
    </main>

    <script src="/logout.js" defer></script>

    <footer>
            <p>FicheStudy — Plateforme de révision</p>
    </footer>
</body>
</html>
